name: "01 — Build pmOS base for laurel_sprout"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget xz-utils zstd cpio --no-install-recommends

      # ============================================================
      # Download and extract pmOS base packages directly
      # .apk = tar.gz with signature. We extract only the data.
      # No Alpine chroot needed — we just need kernel + modules + DTB.
      # ============================================================
      - name: Download and extract pmOS packages
        run: |
          PMOS_MIRROR="https://mirror.postmarketos.org/postmarketos/main/aarch64"
          mkdir -p pmos-pkgs pmos-root

          # Download APKINDEX
          wget -q "$PMOS_MIRROR/APKINDEX.tar.gz" -O pmos-pkgs/APKINDEX.tar.gz

          # Get version from APKINDEX: find P: then read V:
          grep_ver() {
            tar -xzf pmos-pkgs/APKINDEX.tar.gz -O APKINDEX 2>/dev/null | \
              grep -A1 "^P:$1$" | grep "^V:" | sed 's/^V://'
          }

          KERNEL_VER=$(grep_ver "linux-postmarketos-qcom-sm6125")
          echo "Kernel version: $KERNEL_VER"
          [ -z "$KERNEL_VER" ] && { echo "❌ Kernel not found in APKINDEX"; exit 1; }
          KERNEL_PKG="linux-postmarketos-qcom-sm6125-${KERNEL_VER}.apk"

          DEVICE_VER=$(grep_ver "device-xiaomi-laurel")
          echo "Device version: $DEVICE_VER"
          [ -z "$DEVICE_VER" ] && { echo "❌ Device not found in APKINDEX"; exit 1; }
          DEVICE_PKG="device-xiaomi-laurel-${DEVICE_VER}.apk"

          # Download packages
          for pkg in "$KERNEL_PKG" "$DEVICE_PKG"; do
            echo "Downloading: $pkg"
            wget -q "$PMOS_MIRROR/$pkg" -O "pmos-pkgs/$pkg" || {
              echo "❌ Failed: $pkg"
              exit 1
            }
          done

          # Download firmware
          wget -q "$PMOS_MIRROR/linux-firmware-qcom-20260110-r1.apk" \
            -O pmos-pkgs/linux-firmware-qcom.apk 2>/dev/null && echo "✅ firmware" || echo "⚠️ no firmware"

          echo "=== Packages ==="
          ls -lh pmos-pkgs/

          # Extract .apk files (skip signature/PKGINFO)
          for apk in pmos-pkgs/*.apk; do
            echo "Extracting: $(basename $apk)"
            tar -xzf "$apk" -C pmos-root 2>/dev/null || true
          done

          echo "=== Extracted files ==="
          find pmos-root -type f | head -30
          echo "... total: $(find pmos-root -type f | wc -l)"

      # ============================================================
      # Package artifacts
      # ============================================================
      - name: Package artifacts
        run: |
          mkdir -p artifacts

          # Kernel Image
          KERNEL=$(find pmos-root -name "Image.gz" -o -name "Image" -o -name "vmlinuz*" | head -1)
          if [ -n "$KERNEL" ]; then
            cp "$KERNEL" artifacts/kernel-Image.gz
            echo "✅ Kernel: $(ls -lh $KERNEL | awk '{print $5}')"
          else
            echo "❌ No kernel"
            find pmos-root -name "*.gz" | head -10
            exit 1
          fi

          # Kernel version
          KVER=$(ls pmos-root/lib/modules/ 2>/dev/null || ls pmos-root/usr/lib/modules/ 2>/dev/null | head -1)
          echo "KVER=$KVER" >> $GITHUB_ENV
          echo "Kernel: $KVER"

          # Modules
          for d in pmos-root/usr/lib/modules pmos-root/lib/modules; do
            [ -d "$d/$KVER" ] && MOD_DIR="$d/$KVER" && break
          done
          if [ -n "$MOD_DIR" ]; then
            tar -czf artifacts/modules-laurel.tar.gz -C "$(dirname $MOD_DIR)" "$KVER"
            echo "✅ Modules: $(du -sh artifacts/modules-laurel.tar.gz | awk '{print $1}')"
          fi

          # DTB
          DTB=$(find pmos-root -name "*.dtb" | head -1)
          if [ -n "$DTB" ]; then
            cp "$DTB" artifacts/device.dtb
            echo "✅ DTB: $DTB"
          fi

          # Device info
          DI=$(find pmos-root -name "deviceinfo" | head -1)
          if [ -n "$DI" ]; then
            cp "$DI" artifacts/deviceinfo
            echo "=== deviceinfo ==="
            cat artifacts/deviceinfo
          fi

          echo "=== artifacts ==="
          ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmos-base-laurel_sprout
          path: artifacts/
          retention-days: 14
