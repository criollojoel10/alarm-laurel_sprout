name: "01 — Build pmOS base for laurel_sprout"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget xz-utils zstd cpio --no-install-recommends

      # ============================================================
      # Download and extract pmOS base packages directly
      # .apk = tar.gz with signature. We extract only the data.
      # ============================================================
      - name: Download and extract pmOS packages
        run: |
          PMOS_MIRROR="https://mirror.postmarketos.org/postmarketos/main/aarch64"
          mkdir -p pmos-pkgs pmos-root

          # Download APKINDEX to find exact filenames
          wget -q "$PMOS_MIRROR/APKINDEX.tar.gz" -O pmos-pkgs/APKINDEX.tar.gz

          # Find exact package filenames
          KERNEL_APK=$(tar -xzf pmos-pkgs/APKINDEX.tar.gz -O APKINDEX 2>/dev/null | grep -A2 "^P:linux-postmarketos-qcom-sm6125$" | grep "^V:" | head -1 | awk '{print $2}')
          echo "Kernel version: $KERNEL_APK"
          KERNEL_FILE=$(find pmos-pkgs -name "linux-postmarketos-qcom-sm6125-*" 2>/dev/null | head -1)

          # Download kernel package
          KERNEL_PKG="linux-postmarketos-qcom-sm6125-${KERNEL_APK}.apk"
          echo "Downloading: $KERNEL_PKG"
          wget -q "$PMOS_MIRROR/$KERNEL_PKG" -O pmos-pkgs/$KERNEL_PKG 2>&1 || {
            # Try without version suffix
            wget -q "$PMOS_MIRROR/linux-postmarketos-qcom-sm6125.apk" -O pmos-pkgs/linux-postmarketos-qcom-sm6125.apk 2>&1 || true
          }

          # Download device package  
          DEVICE_APK=$(tar -xzf pmos-pkgs/APKINDEX.tar.gz -O APKINDEX 2>/dev/null | grep -A2 "^P:device-xiaomi-laurel$" | grep "^V:" | head -1 | awk '{print $2}')
          echo "Device version: $DEVICE_APK"
          DEVICE_PKG="device-xiaomi-laurel-${DEVICE_APK}.apk"
          wget -q "$PMOS_MIRROR/$DEVICE_PKG" -O pmos-pkgs/$DEVICE_PKG 2>&1 || {
            wget -q "$PMOS_MIRROR/device-xiaomi-laurel.apk" -O pmos-pkgs/device-xiaomi-laurel.apk 2>&1 || true
          }

          # Download firmware (optional, for Qualcomm Wi-Fi/Bluetooth)
          FIRMWARE_PKG="linux-firmware-qcom-20260110-r1.apk"
          wget -q "$PMOS_MIRROR/$FIRMWARE_PKG" -O pmos-pkgs/$FIRMWARE_PKG 2>&1 || true

          echo "=== Downloaded packages ==="
          ls -lh pmos-pkgs/

          # Extract kernel .apk (skip .SIGN.RSA., .PKGINFO, extract everything else)
          for apk in pmos-pkgs/*.apk; do
            echo "Extracting: $apk"
            # .apk = .tar.gz with .SIGN.RSA. and .PKGINFO at start
            # Skip the first two entries (signature + PKGINFO)
            tar -xzf "$apk" --skip-old-files -C pmos-root 2>/dev/null || {
              # Alternative: extract all, we don't care about signature files
              tar -xzf "$apk" -C pmos-root 2>/dev/null || true
            }
          done

          echo "=== Extracted files ==="
          find pmos-root -type f | head -30
          echo "..."
          find pmos-root -type f | wc -l

      # ============================================================
      # Identify kernel, DTB, modules, firmware
      # ============================================================
      - name: Identify artifacts
        run: |
          mkdir -p artifacts

          # Find kernel Image
          KERNEL=$(find pmos-root -name "Image.gz" -o -name "Image" -o -name "vmlinuz*" 2>/dev/null | head -1)
          if [ -z "$KERNEL" ]; then
            KERNEL=$(find pmos-root -name "*.gz" -path "*/boot/*" | head -1)
          fi
          if [ -f "$KERNEL" ]; then
            cp "$KERNEL" artifacts/kernel-Image.gz
            echo "✅ Kernel: $KERNEL ($(ls -lh $KERNEL | awk '{print $5}'))"
          else
            echo "❌ No kernel found"
            find pmos-root -type f -name "*.gz" | head -10
          fi

          # Find kernel version
          KVER=$(ls pmos-root/lib/modules/ 2>/dev/null | head -1)
          if [ -z "$KVER" ]; then
            KVER=$(ls pmos-root/usr/lib/modules/ 2>/dev/null | head -1)
          fi
          echo "Kernel version: $KVER"
          echo "$KVER" > artifacts/kernel-version.txt

          # Find DTB
          DTB_BASE="pmos-root/usr/lib/modules"
          if [ ! -d "$DTB_BASE" ]; then
            DTB_BASE="pmos-root/lib/modules"
          fi
          DTB=$(find "$DTB_BASE/$KVER/dtbs" -name "*.dtb" 2>/dev/null | head -1)
          if [ -n "$DTB" ]; then
            cp "$DTB" artifacts/device.dtb
            echo "✅ DTB: $DTB"
          else
            echo "⚠️ No DTB found"
          fi

          # Package modules
          MOD_DIR="pmos-root/usr/lib/modules"
          [ -d "$MOD_DIR" ] || MOD_DIR="pmos-root/lib/modules"
          if [ -d "$MOD_DIR/$KVER" ]; then
            tar -czf artifacts/modules-laurel.tar.gz -C "$MOD_DIR" "$KVER"
            echo "✅ Modules packaged: $(du -sh artifacts/modules-laurel.tar.gz | awk '{print $1}')"
          fi

          # Package firmware
          FW_DIR="pmos-root/lib/firmware"
          if [ -d "$FW_DIR" ]; then
            tar -czf artifacts/firmware-laurel.tar.gz -C "$FW_DIR" .
            echo "✅ Firmware packaged: $(du -sh artifacts/firmware-laurel.tar.gz | awk '{print $1}')"
          fi

          # Copy deviceinfo
          DI=$(find pmos-root -name "deviceinfo" 2>/dev/null | head -1)
          if [ -n "$DI" ]; then
            cp "$DI" artifacts/deviceinfo
            cat artifacts/deviceinfo
          fi

          echo "=== Artifacts ==="
          ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmos-base-laurel_sprout
          path: artifacts/
          retention-days: 14
