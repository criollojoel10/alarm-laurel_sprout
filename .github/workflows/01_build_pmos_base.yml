name: "01 — Build pmOS base for laurel_sprout"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

env:
  # Fix #1: usar mirror 'master' (no 'main') — xiaomi-laurel está en master/testing
  PMOS_MIRROR: "https://mirror.postmarketos.org/postmarketos/master/aarch64"
  DEVICE: xiaomi-laurel

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            wget xz-utils zstd cpio python3 python3-pip \
            qemu-user-static binfmt-support \
            --no-install-recommends

      # ============================================================
      # Download pmOS packages from master mirror
      # Kernel: linux-postmarketos-qcom-sm6125 (SM6125/665 SoC)
      # Device: device-xiaomi-laurel
      # ============================================================
      - name: Download and extract pmOS packages
        run: |
          PMOS_MIRROR="${{ env.PMOS_MIRROR }}"
          mkdir -p pmos-pkgs pmos-root

          # Download APKINDEX
          wget -q "$PMOS_MIRROR/APKINDEX.tar.gz" -O pmos-pkgs/APKINDEX.tar.gz

          # Helper: get version from APKINDEX
          grep_ver() {
            tar -xzf pmos-pkgs/APKINDEX.tar.gz -O APKINDEX 2>/dev/null | \
              grep -A1 "^P:$1$" | grep "^V:" | sed 's/^V://'
          }

          # Kernel: qcom-sm6125 (Snapdragon 665/ laurel SoC)
          KERNEL_VER=$(grep_ver "linux-postmarketos-qcom-sm6125")
          echo "Kernel version: $KERNEL_VER"
          [ -z "$KERNEL_VER" ] && { echo "❌ linux-postmarketos-qcom-sm6125 not found in APKINDEX"; exit 1; }
          KERNEL_PKG="linux-postmarketos-qcom-sm6125-${KERNEL_VER}.apk"

          # Device package
          DEVICE_VER=$(grep_ver "device-xiaomi-laurel")
          echo "Device version: $DEVICE_VER"
          [ -z "$DEVICE_VER" ] && { echo "❌ device-xiaomi-laurel not found in APKINDEX"; exit 1; }
          DEVICE_PKG="device-xiaomi-laurel-${DEVICE_VER}.apk"

          # postmarketos-mkinitfs (needed for initramfs generation)
          MKINIT_VER=$(grep_ver "postmarketos-mkinitfs")
          echo "mkinitfs version: $MKINIT_VER"
          [ -z "$MKINIT_VER" ] && MKINIT_PKG="" || MKINIT_PKG="postmarketos-mkinitfs-${MKINIT_VER}.apk"

          # postmarketos-initramfs (initramfs init script)
          PINIT_VER=$(grep_ver "postmarketos-initramfs")
          echo "pmOS initramfs version: $PINIT_VER"
          [ -z "$PINIT_VER" ] && PINIT_PKG="" || PINIT_PKG="postmarketos-initramfs-${PINIT_VER}.apk"

          # postmarketos-base (needed for mkinitfs config)
          PBASE_VER=$(grep_ver "postmarketos-base")
          echo "pmOS base version: $PBASE_VER"
          [ -z "$PBASE_VER" ] && PBASE_PKG="" || PBASE_PKG="postmarketos-base-${PBASE_VER}.apk"

          # Download packages
          for pkg in "$KERNEL_PKG" "$DEVICE_PKG" "$MKINIT_PKG" "$PINIT_PKG" "$PBASE_PKG"; do
            [ -z "$pkg" ] && continue
            echo "Downloading: $pkg"
            wget -q "$PMOS_MIRROR/$pkg" -O "pmos-pkgs/$pkg" || {
              echo "⚠️ Failed to download $pkg"
            }
          done

          # Firmware (qcom specific)
          echo "Downloading firmware-qcom..."
          wget -q "$PMOS_MIRROR/firmware-qcom-sm7150-6.0.2-r0.apk" -O pmos-pkgs/firmware-qcom.apk 2>/dev/null || \
          wget -q "$PMOS_MIRROR/linux-firmware-qcom-20260110-r1.apk" -O pmos-pkgs/firmware-qcom.apk 2>/dev/null || \
          echo "⚠️ Could not download firmware package"

          echo "=== Downloaded packages ==="
          ls -lh pmos-pkgs/ | grep -v APKINDEX

          # Extract .apk files
          for apk in pmos-pkgs/*.apk; do
            echo "Extracting: $(basename $apk)"
            tar -xzf "$apk" -C pmos-root 2>/dev/null || true
          done

          echo "=== Extracted files (first 40) ==="
          find pmos-root -type f | head -40
          echo "Total files: $(find pmos-root -type f | wc -l)"

      # ============================================================
      # Package artifacts for downstream workflow
      # Naming: consistent with what 02_build_alarm_laurel.yml expects
      # ============================================================
      - name: Package artifacts
        run: |
          mkdir -p artifacts

          # --- Kernel Image ---
          KERNEL=$(find pmos-root -name "Image.gz" -o -name "Image" -o -name "vmlinuz*" | head -1)
          if [ -n "$KERNEL" ]; then
            cp "$KERNEL" artifacts/vmlinuz
            echo "✅ Kernel: $(ls -lh $KERNEL | awk '{print $5}')"
          else
            echo "❌ No kernel found"
            find pmos-root -name "*.gz" | head -10
            exit 1
          fi

          # --- Kernel version ---
          KVER=$(ls pmos-root/lib/modules/ 2>/dev/null | head -1)
          [ -z "$KVER" ] && KVER=$(ls pmos-root/usr/lib/modules/ 2>/dev/null | head -1)
          echo "KVER=$KVER" >> $GITHUB_ENV
          echo "Kernel: $KVER"

          # --- Modules ---
          for d in pmos-root/usr/lib/modules pmos-root/lib/modules; do
            [ -d "$d/$KVER" ] && MOD_DIR="$d/$KVER" && break
          done
          if [ -n "$MOD_DIR" ]; then
            tar -czf artifacts/modules.tar.gz -C "$(dirname $MOD_DIR)" "$KVER"
            echo "✅ Modules: $(du -sh artifacts/modules.tar.gz | awk '{print $1}')"
          else
            echo "❌ No modules found"
            exit 1
          fi

          # --- Firmware (try multiple locations) ---
          FIRMWARE_DIRS=""
          [ -d pmos-root/lib/firmware ] && FIRMWARE_DIRS="$FIRMWARE_DIRS pmos-root/lib/firmware"
          [ -d pmos-root/usr/lib/firmware ] && FIRMWARE_DIRS="$FIRMWARE_DIRS pmos-root/usr/lib/firmware"
          [ -d pmos-root/firmware ] && FIRMWARE_DIRS="$FIRMWARE_DIRS pmos-root/firmware"
          if [ -n "$FIRMWARE_DIRS" ]; then
            for fd in $FIRMWARE_DIRS; do
              tar -czf artifacts/firmware.tar.gz -C "$(dirname $fd)" "$(basename $fd)" 2>/dev/null || true
            done
            if [ -f artifacts/firmware.tar.gz ] && [ -s artifacts/firmware.tar.gz ]; then
              echo "✅ Firmware: $(du -sh artifacts/firmware.tar.gz | awk '{print $1}')"
            else
              rm -f artifacts/firmware.tar.gz
              echo "⚠️ No firmware to package"
            fi
          else
            echo "⚠️ No firmware directory found"
          fi

          # --- DTB (laurel = qcom/sm6125-xiaomi-laurel_sprout) ---
          # Buscar DTB de laurel: sm6125, qcom, o con nombre 'laurel'
          DTB=$(find pmos-root -name "*laurel*" -name "*.dtb" 2>/dev/null | head -1)
          if [ -z "$DTB" ]; then
            DTB=$(find pmos-root -name "*sm6125*.dtb" 2>/dev/null | head -1)
          fi
          if [ -z "$DTB" ]; then
            DTB=$(find pmos-root -path "*/firmware/*qcom*" -name "*.dtb" 2>/dev/null | head -5)
          fi
          if [ -z "$DTB" ]; then
            DTB=$(find pmos-root -name "*.dtb" -not -path "*/zynq*" 2>/dev/null | head -5)
          fi
          if [ -n "$DTB" ]; then
            mkdir -p artifacts/dtbs
            echo "$DTB" | while IFS= read -r dtb; do
              cp "$dtb" artifacts/dtbs/
            done
            echo "✅ DTB files:"
            ls -lh artifacts/dtbs/
          else
            echo "⚠️ No DTB found"
          fi

          # --- DeviceInfo (para downstream workflow) ---
          # mkinitfs espera /usr/share/deviceinfo/deviceinfo o /etc/deviceinfo
          DI_SRC="pmos-root/usr/share/deviceinfo/device-xiaomi-laurel"
          if [ ! -f "$DI_SRC" ]; then
            DI_SRC="$(find pmos-root/usr/share/deviceinfo -type f 2>/dev/null | head -1)"
          fi
          if [ -n "$DI_SRC" ] && [ -f "$DI_SRC" ]; then
            cp "$DI_SRC" artifacts/deviceinfo
            echo "=== deviceinfo ==="
            cat artifacts/deviceinfo 2>/dev/null || echo "(empty)"
          else
            echo "deviceinfo not found - trying broader search..."
            DI_FILE=$(find pmos-root -name "deviceinfo" -type f 2>/dev/null | head -1)
            if [ -n "$DI_FILE" ]; then
              cp "$DI_FILE" artifacts/deviceinfo
            else
              echo "deviceinfo not found as file anywhere"
            fi
          fi

          # ============================================================
          # Generate initramfs using Alpine mkinitfs in qemu-aarch64 chroot
          # ============================================================
      - name: Setup Alpine chroot for initramfs
        run: |
          # Fix #1: Alpine v3.21 fija (no edge/head -1 que agarraba vintage 2019)
          ALPINE_URL="https://dl-cdn.alpinelinux.org/alpine/v3.21/releases/aarch64"
          ALPINE_FILE="$(
            curl -sL "$ALPINE_URL/" |
            grep -oE 'alpine-minirootfs-[0-9]+\.[0-9]+\.[0-9]+-aarch64\.tar\.gz' |
            sort -V |
            tail -1
          )"
          [ -z "$ALPINE_FILE" ] && ALPINE_FILE="alpine-minirootfs-3.21.3-aarch64.tar.gz"
          echo "Downloading Alpine rootfs: $ALPINE_FILE"
          wget -q "$ALPINE_URL/$ALPINE_FILE" -O alpine-rootfs.tar.gz || {
            echo "Trying specific version..."
            wget -q "https://dl-cdn.alpinelinux.org/alpine/v3.21/releases/aarch64/alpine-minirootfs-3.21.3-aarch64.tar.gz" \
              -O alpine-rootfs.tar.gz || {
              echo "❌ Failed to download Alpine rootfs"
              exit 1
            }
          }
          ls -lh alpine-rootfs.tar.gz

          # Extract Alpine rootfs
          mkdir -p alpine-chroot
          sudo tar -xzf alpine-rootfs.tar.gz -C alpine-chroot
          sudo cp "$(which qemu-aarch64-static)" alpine-chroot/usr/bin/

          # Set up network
          sudo rm -f alpine-chroot/etc/resolv.conf
          sudo bash -c 'cp /etc/resolv.conf alpine-chroot/etc/resolv.conf'

          # Mount pseudo-fs
          sudo mount -t proc proc alpine-chroot/proc
          sudo mount --bind /sys alpine-chroot/sys
          sudo mount --bind /dev alpine-chroot/dev
          sudo mount --bind /dev/pts alpine-chroot/dev/pts 2>/dev/null || true

      - name: Copy pmOS binaries into Alpine chroot
        run: |
          # No usamos 'apk add' (mirror pmOS no es repo Alpine valido).
          # Copiamos mkinitfs + assets desde pmos-root directamente al chroot.

          # mkinitfs binario
          sudo cp -a pmos-root/usr/sbin/mkinitfs alpine-chroot/usr/sbin/mkinitfs
          sudo chmod +x alpine-chroot/usr/sbin/mkinitfs

          # Assets (initramfs, mkinitfs, deviceinfo shares)
          sudo mkdir -p alpine-chroot/usr/share
          for dir in initramfs mkinitfs postmarketos-mkinitfs; do
            [ -d "pmos-root/usr/share/$dir" ] && sudo cp -a "pmos-root/usr/share/$dir/." "alpine-chroot/usr/share/$dir/" 2>/dev/null || true
          done

          # Device info — mkinitfs requiere archivo (no directorio) en:
          # /usr/share/deviceinfo/deviceinfo  o  /etc/deviceinfo
          DI_SRC="pmos-root/usr/share/deviceinfo/device-xiaomi-laurel"
          if [ ! -f "$DI_SRC" ]; then
            DI_SRC="$(find pmos-root/usr/share/deviceinfo -type f | head -1)"
          fi
          if [ -z "$DI_SRC" ] || [ ! -f "$DI_SRC" ]; then
            echo "ERROR: no deviceinfo source found"
            find pmos-root/usr/share/deviceinfo -maxdepth 2 -type f 2>/dev/null || true
            exit 1
          fi
          echo "Using deviceinfo: $DI_SRC"
          sudo mkdir -p alpine-chroot/usr/share/deviceinfo
          sudo cp "$DI_SRC" alpine-chroot/usr/share/deviceinfo/deviceinfo
          sudo cp "$DI_SRC" alpine-chroot/etc/deviceinfo
          echo "=== deviceinfo installed ==="
          sudo ls -lh alpine-chroot/usr/share/deviceinfo/deviceinfo alpine-chroot/etc/deviceinfo
          sudo head -10 alpine-chroot/etc/deviceinfo

          # Kernel modules — preservar estructura 6.1.0-sm6125/
          sudo mkdir -p alpine-chroot/lib/modules
          sudo rm -rf alpine-chroot/lib/modules/*
          if [ -d pmos-root/lib/modules ] && [ -n "$(ls pmos-root/lib/modules/)" ]; then
            sudo cp -a pmos-root/lib/modules/. alpine-chroot/lib/modules/
          fi

          # Validar
          echo "=== mkinitfs check ==="
          sudo chroot alpine-chroot /bin/sh -c 'command -v mkinitfs && mkinitfs --version || echo "MISSING"'
          echo "=== modules tree ==="
          find alpine-chroot/lib/modules -maxdepth 2 -type d 2>/dev/null | sort || echo "(none)"

      - name: Generate initramfs
        run: |
          KVER=$(find pmos-root/lib/modules -maxdepth 1 -mindepth 1 -type d -printf '%f\n' | head -1)
          [ -z "$KVER" ] && KVER=$(find alpine-chroot/lib/modules -maxdepth 1 -mindepth 1 -type d -printf '%f\n' | head -1)
          echo "KVER=$KVER"
          [ -z "$KVER" ] && { echo "ERROR: no kernel version found"; exit 1; }

          # mkinitfs de pmOS: flags: -d <dir>, -no-bootdeploy. NO acepta -c ni -o.
          sudo mkdir -p alpine-chroot/boot
          sudo chroot alpine-chroot /bin/sh -c "
            set -eux
            command -v mkinitfs
            echo '=== deviceinfo check ==='
            ls -lh /usr/share/deviceinfo/deviceinfo /etc/deviceinfo
            head -10 /etc/deviceinfo
            echo '=== modules check ==='
            ls -lh /lib/modules/$KVER
            ls /lib/modules/ | head -5
            mkinitfs -d /boot -no-bootdeploy $KVER
            echo '=== boot dir ==='
            ls -lh /boot/
          "

          # Encontrar initramfs (mkinitfs nombra initramfs-<kver>)
          INITRAMFS_FILE="$(sudo find alpine-chroot/boot -maxdepth 1 -type f -name 'initramfs-*' | head -1 || true)"
          if [ -n "$INITRAMFS_FILE" ] && [ -f "$INITRAMFS_FILE" ]; then
            sudo cp "$INITRAMFS_FILE" artifacts/initramfs
            sudo chmod 644 artifacts/initramfs
            echo "Initramfs: $(ls -lh artifacts/initramfs | awk '{print $5}')"
          else
            echo "No initramfs generated in /boot/"
            sudo ls -lh alpine-chroot/boot/ 2>/dev/null || true
            exit 1
          fi

      # ============================================================
      # Build boot.img with mkbootimg
      # ============================================================
      - name: Build boot.img
        run: |
          DTB=$(find artifacts/dtbs -name "*.dtb" | head -1 || true)
          if [ -z "$DTB" ]; then
            DTB=$(find pmos-root -name "*.dtb" | head -1)
            [ -n "$DTB" ] && cp "$DTB" artifacts/dtbs/
          fi
          echo "DTB: $DTB"

          INITRAMFS="artifacts/initramfs"
          if [ ! -f "$INITRAMFS" ]; then
            echo "No initramfs, cannot build boot.img"
            exit 1
          fi

          # Install mkbootimg
          pip3 install mkbootimg 2>/dev/null || true

          # Build boot.img using script
          CMDLINE="root=LABEL=pmOS_root rw rootwait console=ttyMSM0,115200 earlycon=msm_serial_dm,0x00a90000 bootopt=64S3,32N2,64N2 androidboot.bootdevice=7824900.sdhci"
          python3 scripts/build-bootimg.py \
            artifacts/vmlinuz "$INITRAMFS" "$CMDLINE" \
            artifacts/boot.img "$DTB" 2>&1

          echo "=== Final boot.img ==="
          ls -lh artifacts/boot.img || echo "boot.img not created"

      - name: Cleanup chroot
        if: always()
        run: |
          sudo umount alpine-chroot/dev/pts 2>/dev/null || true
          sudo umount alpine-chroot/dev 2>/dev/null || true
          sudo umount alpine-chroot/sys 2>/dev/null || true
          sudo umount alpine-chroot/proc 2>/dev/null || true

      # ============================================================
      # Final verification
      # ============================================================
      - name: Verify artifacts
        run: |
          echo "=== Final artifact contents ==="
          ls -lh artifacts/
          echo ""
          for f in boot.img vmlinuz modules.tar.gz initramfs deviceinfo; do
            if [ -f "artifacts/$f" ]; then
              echo "✅ $f"
            else
              case "$f" in
                initramfs|deviceinfo) echo "⚠️ $f missing (optional)" ;;
                *) echo "❌ $f MISSING" ;;
              esac
            fi
          done
          echo ""
          if [ -f artifacts/boot.img ]; then
            echo "boot.img SHA256: $(sha256sum artifacts/boot.img | cut -d' ' -f1)"
            echo "boot.img size: $(ls -lh artifacts/boot.img | awk '{print $5}')"
          fi
          if [ -f artifacts/modules.tar.gz ]; then
            MOD_CNT=$(tar -tzf artifacts/modules.tar.gz | wc -l)
            echo "Modules: $(du -sh artifacts/modules.tar.gz | awk '{print $1}') ($MOD_CNT files)"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmos-base-${{ env.DEVICE }}
          path: artifacts/
          retention-days: 90
