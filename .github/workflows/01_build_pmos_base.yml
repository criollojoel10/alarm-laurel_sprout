name: "01 — Fetch pmOS base for laurel_sprout"

on:
  workflow_dispatch:
    inputs:
      source_run:
        description: "Build # from laurel-postmarketos-build"
        default: "1"

env:
  PAT: ${{ secrets.PMOS_PAT }}

jobs:
  fetch:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            android-sdk-libsparse-utils \
            --no-install-recommends

      - name: Download artifact
        run: |
          echo "${{ env.PAT }}" | gh auth login --with-token 2>/dev/null || true
          RUN_ID=$(gh run list --repo criollojoel10/laurel-postmarketos-build --limit 100 --json databaseId,number -q ".[] | select(.number == ${{ inputs.source_run }}) | .databaseId" | head -1)
          [ -z "$RUN_ID" ] && RUN_ID="${{ inputs.source_run }}"
          echo "Run ID: $RUN_ID"
          gh run download "$RUN_ID" \
            --repo criollojoel10/laurel-postmarketos-build \
            --name pmos-laurel-console-cross-true \
            --dir pmos-raw 2>&1
          cd pmos-raw && zip -r ../pmos.zip . && cd ..

      - name: Extract boot files
        run: |
          mkdir -p pmos out
          unzip -o pmos.zip -d pmos/
          EXDIR=$(find pmos -type d -name "export" | head -1)
          [ -z "$EXDIR" ] && EXDIR="pmos"

          cp "$EXDIR/boot.img" out/boot.img
          [ -f "$EXDIR/vmlinuz" ] && cp "$EXDIR/vmlinuz" out/vmlinuz
          for f in "$EXDIR/initramfs" "$EXDIR/initramfs.gz" "$EXDIR/initrd.img"; do
            [ -f "$f" ] && cp "$f" out/initramfs && break
          done
          echo "=== out/ ==="; ls -lh out/

      - name: Scan and extract filesystems
        run: |
          SYSIMG=$(find pmos -name "xiaomi-laurel.img" -o -name "*.img" | head -1)
          echo "System image: $(ls -lh $SYSIMG)"

          # Convert sparse -> raw
          file "$SYSIMG" | grep -q "sparse" && simg2img "$SYSIMG" system-raw.img || cp "$SYSIMG" system-raw.img
          echo "Raw image: $(ls -lh system-raw.img)"

          # Scan for ext4 partitions and extract modules/firmware
          python3 scripts/scan-extract-fs.py system-raw.img out

      - name: Verify content
        run: |
          echo "=== Final artifact contents ==="
          ls -lh out/
          echo ""
          echo "boot.img SHA256: $(sha256sum out/boot.img | cut -d' ' -f1)"
          echo ""
          if [ -f out/modules.tar.gz ]; then
            MOD_SIZE=$(ls -lh out/modules.tar.gz | awk '{print $5}')
            MOD_COUNT=$(tar -tzf out/modules.tar.gz | wc -l)
            echo "modules.tar.gz: $MOD_SIZE ($MOD_COUNT files)"
          else
            echo "❌ modules.tar.gz MISSING"
          fi
          if [ -f out/firmware.tar.gz ]; then
            echo "firmware.tar.gz: $(ls -lh out/firmware.tar.gz | awk '{print $5}')"
          else
            echo "❌ firmware.tar.gz MISSING"
          fi
          [ -f out/initramfs ] && echo "initramfs: $(ls -lh out/initramfs | awk '{print $5}')"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: pmos-base-laurel
          path: out/
          retention-days: 90
